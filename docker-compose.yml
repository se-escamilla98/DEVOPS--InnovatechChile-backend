version: '3.8'

services:
  # Servicio del Backend 
  backend:
    build: .
    container_name: innovatech_backend
    ports:
      - "8080:8080"  
    environment:  
      DB_HOST: db         
      DB_PORT: 5432
      DB_NAME: innovatech_db
      DB_USER: innovatech_user
      DB_PASSWORD: innovatech_pass
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy  # Espera a que PostgreSQL esté listo antes de arrancar
    networks:
      - innovatech_network

  # Servicio de Base de Datos 
  db:
    image: postgres:15-alpine 
    container_name: innovatech_db
    environment:
      POSTGRES_DB: innovatech_db
      POSTGRES_USER: innovatech_user
      POSTGRES_PASSWORD: innovatech_pass
    volumes:
      # Named volume: persiste los datos aunque el contenedor se destruya.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innovatech_user -d innovatech_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - innovatech_network
volumes:
  postgres_data:

# Red interna privada entre servicios.
networks:
  innovatech_network:
    driver: bridge
